name: Bug 反馈 / Bug Report
description: 报告一个可以复现的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: 发生了什么？
      description: 请描述你当时在做什么，以及哪里不符合预期。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 你原本期待发生什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 如何复现？
      description: 请使用虚构或脱敏内容，不要贴未公开稿件正文。
      placeholder: |
        1. 打开...
        2. 点击...
        3. 输入...
        4. 看到...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      placeholder: "系统、浏览器、Node.js 版本、pnpm 版本"
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请先移除 API key、稿件正文、请求内容和个人本地路径。
